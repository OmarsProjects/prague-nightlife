document.getElementById('zoomIn').onclick   = () => zoomCamera(0.35);
document.getElementById('zoomOut').onclick  = () => zoomCamera(-0.55);
document.getElementById('tiltUp').onclick   = () => tiltCamera(10);
document.getElementById('tiltDown').onclick = () => tiltCamera(-10);
document.getElementById('rotLeft').onclick  = () => rotateCamera(-22);
document.getElementById('rotRight').onclick = () => rotateCamera(22);
document.getElementById('resetView').onclick = resetView;

// =====================================================================
// TOON MODE — low-poly stylized 3D buildings via MapLibre + OSM data.
// When zoomed close, photogrammetric tiles get mushy. Toon mode swaps
// to flat-shaded extruded buildings sourced from OpenStreetMap.
// =====================================================================
let toonMap = null;
let toonMode = false;
let toonMarkers = [];

function buildToonStyle() {
  // Time-of-day awareness. Real local hour drives the entire palette.
  const h = new Date().getHours();
  const isNight = (h >= 19 || h < 6);
  const isDusk  = (h === 18 || h === 6 || h === 7);

  const src = { omt: { type: 'vector', url: 'https://tiles.openfreemap.org/planet' } };

  if (isNight) {
    return {
      version: 8,
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources: src,
      layers: [
        { id: 'sky', type: 'background',
          paint: { 'background-color': '#06101e' } },
        // Subtle stippled noise under everything for warmth
        { id: 'land', type: 'fill', source: 'omt', 'source-layer': 'landcover',
          paint: { 'fill-color': '#11142a', 'fill-opacity': 0.6 } },
        { id: 'water', type: 'fill', source: 'omt', 'source-layer': 'water',
          paint: { 'fill-color': '#08182a', 'fill-opacity': 0.92 } },
        // Reflection highlight on water
        { id: 'water-shimmer', type: 'fill', source: 'omt', 'source-layer': 'water',
          paint: { 'fill-color': '#3a5a90', 'fill-opacity': 0.12 } },
        { id: 'park', type: 'fill', source: 'omt', 'source-layer': 'park',
          paint: { 'fill-color': '#0d2018', 'fill-opacity': 0.85 } },
        // Streetlight bloom (very wide, soft)
        { id: 'road-glow-outer', type: 'line', source: 'omt', 'source-layer': 'transportation',
          paint: {
            'line-color': '#ffae5e',
            'line-blur': 18,
            'line-opacity': 0.20,
            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 8, 18, 36],
          } },
        // Streetlight inner halo
        { id: 'road-glow', type: 'line', source: 'omt', 'source-layer': 'transportation',
          paint: {
            'line-color': '#ffce8a',
            'line-blur': 7,
            'line-opacity': 0.42,
            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 4, 18, 18],
          } },
        // Road surface — dark warm tarmac
        { id: 'roads', type: 'line', source: 'omt', 'source-layer': 'transportation',
          paint: {
            'line-color': '#3a2818',
            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 1.2, 18, 5],
          } },
        // Buildings — dark navy with warm street-level wash
        { id: 'buildings-3d', type: 'fill-extrusion', source: 'omt', 'source-layer': 'building',
          minzoom: 14,
          paint: {
            'fill-extrusion-color': [
              'interpolate', ['linear'], ['coalesce', ['get', 'render_height'], ['get', 'height'], 8],
              0,  '#3a2418',
              4,  '#2a2032',
              10, '#241d35',
              25, '#1a162d',
              60, '#0e0c1c',
            ],
            'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 8],
            'fill-extrusion-base':   ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
            'fill-extrusion-opacity': 0.95,
            'fill-extrusion-vertical-gradient': true,
          } },
        // Lit-window layer — warm yellow on lower floors, varies by building height
        { id: 'building-windows', type: 'fill-extrusion', source: 'omt', 'source-layer': 'building',
          minzoom: 15,
          filter: ['<', ['coalesce', ['get', 'render_height'], 8], 30],
          paint: {
            'fill-extrusion-color': [
              'interpolate', ['linear'], ['coalesce', ['get', 'render_height'], 8],
              5,  '#ffd680',  // smaller buildings = warmer (homes, cafes)
              15, '#ffb35e',
              30, '#a07a4a',
            ],
            'fill-extrusion-height': ['*', 0.62, ['coalesce', ['get', 'render_height'], 8]],
            'fill-extrusion-base':   ['*', 0.22, ['coalesce', ['get', 'render_height'], 8]],
            'fill-extrusion-opacity': 0.22,
          } },
        // Outline buildings with a thin black stroke at high zoom — Sims sketchbook feel
        { id: 'building-outline', type: 'line', source: 'omt', 'source-layer': 'building',
          minzoom: 16,
          paint: {
            'line-color': '#000000',
            'line-width': 0.7,
            'line-opacity': 0.55,
          } },
      ],
      sky: { 'sky-color': '#06101e' },
      light: { anchor: 'map', color: '#7088c8', intensity: 0.18, position: [1.5, 270, 60] },
    };
  }

  // Daytime palette (or dusk shifts toward orange)
  const skyColor = isDusk ? '#f8b878' : '#cfe9ff';
  const buildingTop = isDusk ? '#5a3a44' : '#6b3a2a';
  const buildingMid = isDusk ? '#c98a72' : '#cf8866';
  const buildingBase = isDusk ? '#f7d2a8' : '#f4d6b8';
  return {
    version: 8,
    sources: src,
    layers: [
      { id: 'sky', type: 'background', paint: { 'background-color': skyColor } },
      { id: 'water', type: 'fill', source: 'omt', 'source-layer': 'water',
        paint: { 'fill-color': isDusk ? '#7d8fb0' : '#7ec0ff' } },
      { id: 'park', type: 'fill', source: 'omt', 'source-layer': 'park',
        paint: { 'fill-color': isDusk ? '#a0b88c' : '#bfe6a4' } },
      { id: 'roads', type: 'line', source: 'omt', 'source-layer': 'transportation',
        paint: { 'line-color': '#fff8e7', 'line-width': ['interpolate', ['linear'], ['zoom'], 12, 1.2, 18, 5] } },
      { id: 'road-edges', type: 'line', source: 'omt', 'source-layer': 'transportation',
        paint: { 'line-color': '#caa776',
          'line-width': ['interpolate', ['linear'], ['zoom'], 14, 0.5, 18, 2],
          'line-gap-width': ['interpolate', ['linear'], ['zoom'], 12, 1.2, 18, 5] } },
      { id: 'buildings-3d', type: 'fill-extrusion', source: 'omt', 'source-layer': 'building',
        minzoom: 14,
        paint: {
          'fill-extrusion-color': [
            'interpolate', ['linear'], ['coalesce', ['get', 'render_height'], ['get', 'height'], 8],
            0, buildingBase, 10, '#e8b08a', 20, buildingMid, 40, '#9c5a44', 80, buildingTop,
          ],
          'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 8],
          'fill-extrusion-base':   ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
          'fill-extrusion-opacity': 0.94,
          'fill-extrusion-vertical-gradient': true,
        } },
      // Sketchbook outline on each building — Sims-y at high zoom
      { id: 'building-outline', type: 'line', source: 'omt', 'source-layer': 'building',
        minzoom: 16,
        paint: {
          'line-color': isDusk ? '#3a2515' : '#7a4628',
          'line-width': 0.8,
          'line-opacity': 0.5,
        } },
    ],
    sky: { 'sky-color': skyColor },
    light: { anchor: 'viewport', color: 'white', intensity: 0.55, position: [1.5, 90, 80] },
  };
}

function initToon() {
  if (toonMap) return;
  toonMap = new maplibregl.Map({
    container: 'toonContainer',
    style: buildToonStyle(),
    center: [14.4205, 50.0855],
    zoom: 16,
    pitch: 55,
    bearing: -20,
    antialias: true,
  });
  toonMap.on('load', () => addToonMarkers());
  toonMap.on('styledata', () => addToonMarkers());
}

function addToonMarkers() {
  toonMarkers.forEach(m => m.remove());
  toonMarkers = [];
  const h = new Date().getHours();
  const isNight = (h >= 19 || h < 6);
  for (const v of VENUES) {
    const score = venueScore(v, new Date());
    const color = scoreColor(score);
    const el = document.createElement('div');
    const glow = isNight
      ? `0 0 14px ${color}, 0 0 28px ${color}88, 0 4px 16px rgba(0,0,0,0.6)`
      : `0 4px 14px rgba(0,0,0,0.45)`;
    el.style.cssText = `width:32px;height:32px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:${glow};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#1a1a1a;font-family:ui-monospace,monospace;font-weight:800`;
    el.textContent = score;
    el.title = v.name;
    el.onclick = () => openDetail(v.id);
    const m = new maplibregl.Marker({ element: el })
      .setLngLat([v.lng, v.lat])
      .addTo(toonMap);
    toonMarkers.push(m);
  }
}

function syncCameraCesiumToToon() {
  if (!cesiumViewer) return;
  const cam = cesiumViewer.scene.camera;
  const carto = Cesium.Cartographic.fromCartesian(cam.position);
  const lng = Cesium.Math.toDegrees(carto.longitude);
  const lat = Cesium.Math.toDegrees(carto.latitude);
  const height = carto.height;
  // Rough mapping from camera height → MapLibre zoom
  const zoom = Math.max(13, Math.min(19, 23 - Math.log2(Math.max(20, height)) * 1.05));
  const pitch = Math.min(70, Math.max(0, -Cesium.Math.toDegrees(cam.pitch)));
  const bearing = Cesium.Math.toDegrees(cam.heading);
  if (toonMap) {
    toonMap.jumpTo({ center: [lng, lat], zoom, pitch, bearing });
  }
}
function syncCameraToonToCesium() {
  if (!cesiumViewer || !toonMap) return;
  const c = toonMap.getCenter();
  const z = toonMap.getZoom();
  const pitch = toonMap.getPitch();
  const bearing = toonMap.getBearing();
  // Inverse of zoom→height
  const height = Math.pow(2, 23 - z) / 1.05;
  cesiumViewer.scene.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(c.lng, c.lat, height),
    orientation: {
      heading: Cesium.Math.toRadians(bearing),
      pitch: Cesium.Math.toRadians(-pitch),
      roll: 0,
    },
  });
}

// =====================================================================
// 2D character markers for Toon mode — small round person-from-above
// dots that wander around the focused venue.
// =====================================================================
const _toonCharMarkers = [];
let _toonCharTimer = null;

function clearToonCharacters() {
  for (const m of _toonCharMarkers) m.remove();
  _toonCharMarkers.length = 0;
  if (_toonCharTimer) { clearInterval(_toonCharTimer); _toonCharTimer = null; }
}

function spawnToonCharacters(v) {
  if (!toonMap) return;
  clearToonCharacters();
  const score = venueScore(v, new Date());
  const count = Math.max(5, Math.min(22, Math.round(score / 4.5)));
  const lat0 = v.lat * Math.PI / 180;
  const chars = [];
  for (let i = 0; i < count; i++) {
    const isQueuer = i < count * 0.6;
    const radius = isQueuer ? (3 + Math.random() * 7) : (14 + Math.random() * 16);
    const angle = Math.random() * 2 * Math.PI;
    const lat = v.lat + (radius * Math.cos(angle)) / 111320;
    const lng = v.lng + (radius * Math.sin(angle)) / (111320 * Math.cos(lat0));
    const color = CHAR_COLORS[Math.floor(Math.random() * CHAR_COLORS.length)];
    const el = document.createElement('div');
    // Top-down sims-style person: torso ring + head dot
    el.style.cssText = `
      width: 18px; height: 18px;
      border-radius: 50%;
      background: ${color};
      border: 2px solid rgba(0,0,0,0.6);
      box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 -2px 3px rgba(0,0,0,0.25);
      position: relative;
    `;
    const head = document.createElement('div');
    head.style.cssText = `
      position: absolute; top: 50%; left: 50%;
      width: 7px; height: 7px;
      background: #d6a574;
      border: 1px solid rgba(0,0,0,0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    `;
    el.appendChild(head);
    const m = new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lng, lat])
      .addTo(toonMap);
    _toonCharMarkers.push(m);
    chars.push({ marker: m, lat, lng, baseLat: v.lat, baseLng: v.lng, isQueuer, t: Math.random() * Math.PI * 2 });
  }
  // Animate: tick every 120ms, drift each character along a slow random walk
  _toonCharTimer = setInterval(() => {
    for (const c of chars) {
      c.t += 0.06 + Math.random() * 0.04;
      const stepDist = c.isQueuer ? 0.6 : 1.4; // meters per tick
      const stepLat = (stepDist * Math.cos(c.t)) / 111320;
      const stepLng = (stepDist * Math.sin(c.t)) / (111320 * Math.cos(c.baseLat * Math.PI / 180));
      c.lat += stepLat;
      c.lng += stepLng;
      // Soft tether — pull back toward venue if drifting too far
      const dN = (c.lat - c.baseLat) * 111320;
      const dE = (c.lng - c.baseLng) * 111320 * Math.cos(c.baseLat * Math.PI / 180);
      const dist = Math.sqrt(dN*dN + dE*dE);
      const maxDist = c.isQueuer ? 12 : 35;
      if (dist > maxDist) {
        c.t += Math.PI; // turn around
      }
      c.marker.setLngLat([c.lng, c.lat]);
    }
  }, 120);
}

function toggleToon() {
  toonMode = !toonMode;
  const cesiumEl = document.getElementById('cesiumContainer');
  const mapEl    = document.getElementById('map');
  const toonEl   = document.getElementById('toonContainer');
  const btn      = document.getElementById('toonMode');
  if (toonMode) {
    if (!toonMap) initToon();
    syncCameraCesiumToToon();
    cesiumEl.style.display = 'none';
    mapEl.style.display = 'none';
    toonEl.style.display = 'block';
    if (toonMap) setTimeout(() => toonMap.resize(), 50);
    btn.textContent = '🏙️';
    btn.title = 'Back to photoreal';
  } else {
    syncCameraToonToCesium();
    toonEl.style.display = 'none';
    if (cesiumViewer) {
      cesiumEl.style.display = 'block';
      cesiumViewer.resize();
    } else {
      mapEl.style.display = 'block';
    }
    btn.textContent = '🎨';
    btn.title = 'Toggle Toon mode';
  }
}
document.getElementById('toonMode').onclick = toggleToon;
</script>
